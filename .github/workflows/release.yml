name: Build Release

# Runs automatically when you publish a release on GitHub.
# Builds the Windows installer + portable and the Mac DMG,
# then uploads them to the release as downloadable assets.

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Windows (installer + portable)
        run: npm run pack:win
        env:
          MAIN_VITE_UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}

      - name: Upload Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Model Forge-*-Setup.exe
            release/Model Forge-*-portable.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Mac (universal DMG)
        run: |
          npm run icons
          # Convert 512×512 PNG → .icns using macOS built-in tools
          mkdir -p build/icon.iconset
          sips -z 16   16   build/icon.png --out build/icon.iconset/icon_16x16.png
          sips -z 32   32   build/icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32   32   build/icon.png --out build/icon.iconset/icon_32x32.png
          sips -z 64   64   build/icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128  128  build/icon.png --out build/icon.iconset/icon_128x128.png
          sips -z 256  256  build/icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256  256  build/icon.png --out build/icon.iconset/icon_256x256.png
          sips -z 512  512  build/icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512  512  build/icon.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/icon.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns
          npm run build
          npx electron-builder --mac --publish never
        env:
          MAIN_VITE_UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/Model Forge-*.dmg
